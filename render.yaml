services:
  - type: web
    name: pound-experiment-engine-staging-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: sh scripts/render_predeploy.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: pound-experiment-engine-staging-db
          property: connectionString
      - key: VIDEO_PROVIDER
        value: mock
      - key: STORAGE_PROVIDER
        value: local
      - key: PUBLIC_SITE_BASE_URL
        sync: false
      - key: PUBLIC_EXPERIMENT_CAMPAIGN_SLUG
        value: the-one-pound-experiment
      - key: STRIPE_ENABLED
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AUTH_ENABLED
        value: "false"
    buildFilter:
      paths:
        - backend/**
        - render.yaml
        - .env.example
        - docs/STAGING_DEPLOYMENT.md

databases:
  - name: pound-experiment-engine-staging-db
    plan: basic-256mb
    databaseName: sociopost_staging
    user: sociopost_staging
    ipAllowList: []
